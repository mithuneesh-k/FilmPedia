<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FilmPedia</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="movies/photos/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="Header">
        <div style="width: 32px;"></div>
        <div class="HeaderContent">
            <h1 class="Title">FILMPEDIA</h1>
            <p class="Desc">A Movie Guide</p>
        </div>
        <div style="width: 32px;"></div>
    </div>

    <div class="LoginWrapper">
        <div class="LoginCard">
            <h2 class="LoginTitle">Login</h2>
            <form action="index.html">
                <div class="InputGroup">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="LoginInput" placeholder="Enter your email" required>
                </div>
                
                <div class="InputGroup">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="LoginInput" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="LoginButton">Sign In</button>
            </form>
            <div class="LoginFooter">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <div class="Footer">
        <p>© 2025 FilmPedia. Created by Mithuneesh. K</p>
    </div>

</body>
</html>
