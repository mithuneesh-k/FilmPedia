<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">FilmPedia - Movie Details</title>
    <link rel="icon" type="image/png" href="photos/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .back-btn { display: inline-block; margin-top: 20px; padding: 12px 25px; background: white; color: #1e90ff; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.2s; }
        .back-btn:hover { background: #f0f0f0; transform: scale(1.05); }
        .section { background: white; margin: 20px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section h2 { color: #1e90ff; margin-top: 0; }
        nav ul { display: flex; justify-content: center; gap: 20px; padding: 15px; background: #0078ee; margin: 0; list-style: none; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; padding: 8px 15px; border-radius: 20px; transition: 0.2s; }
        nav ul li a:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body> 
    <div class="Header">
        <div style="width: 32px;"></div>
        <div class="HeaderContent">
            <h1 class="Title"><a href="../index.html" style="color: inherit; text-decoration: none;">FILMPEDIA</a></h1>
            <p class="Desc">A Movie Guide</p>
        </div>
        <div style="width: 32px;"></div>
    </div>

    <div id="content">
        <div class="loading">Loading movie details...</div>
    </div>

    <div class="Footer">
        <p>© 2025 FilmPedia. Created by Mithuneesh. K</p>
    </div>

    <script src="../js/api.js"></script>
    <script>
        async function loadMovieDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const tmdbId = urlParams.get('tmdbId');
            const contentDiv = document.getElementById('content');

            if (!tmdbId) {
                showError("No movie selected.");
                return;
            }

            // Fetch movie details + videos + credits in ONE API call
            const data = await fetchMovies(`/movie/${tmdbId}?append_to_response=videos,credits`);
            if (!data || data.status_code === 34) {
                showError("Movie not found.");
                return;
            }

            const trailerKey = data.videos?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube')?.key;
            const movie = {
                title: data.title || 'Unknown Title',
                image: data.poster_path ? IMG_PATH + data.poster_path : 'photos/logo.png',
                genre: data.genres?.map(g => g.name).join(' • ') || 'N/A',
                rating: `⭐ ${data.vote_average ? data.vote_average.toFixed(1) : 'N/A'}`,
                description: data.overview || 'No description available.',
                trailerUrl: trailerKey ? `https://www.youtube.com/watch?v=${trailerKey}` : '',
                cast: data.credits?.cast?.slice(0, 10).map(c => `${c.name} as ${c.character}`) || [],
                crew: data.credits?.crew?.filter(c => c.job === 'Director' || c.job === 'Producer').slice(0, 3).map(c => `${c.job}: ${c.name}`) || [],
                watchersGuide: [`Runtime: ${data.runtime ?? 'N/A'} min`, `Status: ${data.status || 'N/A'}`, `Released: ${data.release_date || 'N/A'}`]
            };

            document.title = movie.title;

            contentDiv.innerHTML = `
                <div id="moviePoint" class="MainMvContainer" style="margin: 20px; width: auto;">
                    <div class="MovieContainer">
                        <img class="movieImg" src="${movie.image}" alt="${movie.title}" style="width: 150px; height: auto;">
                        <div class="movieDetails">
                            <span class="movieName" style="font-size: 24px;">${movie.title}</span>
                            <p class="movieGenre">${movie.genre}</p>
                            <p class="movieRating">${movie.rating}</p>
                        </div>
                    </div>
                    <p class="movieDesc" style="margin-top: 20px;">${movie.description}</p>
                </div>

                <nav>
                    <ul>
                        <li><a href="#moviePoint">Film</a></li>
                        <li><a href="#castCrew">Cast & Crew</a></li>
                        <li><a href="#watchersGuide">Details</a></li>
                    </ul>
                </nav>

                <div class="section">
                    <h2>Trailer</h2>
                    ${movie.trailerUrl ? `<a href="${movie.trailerUrl}" target="_blank" class="back-btn" style="background: #1e90ff; color: white;">Watch Trailer</a>` : `<p>No trailer available.</p>`}
                </div>

                <div id="castCrew" class="section">
                    <h2>Cast & Crew</h2>
                    <ul style="list-style: none; padding: 0;">
                        ${movie.cast.map(c => `<li style="margin-bottom: 8px;"><strong>${c.split(' as ')[0]}</strong> ${c.includes(' as ') ? 'as ' + c.split(' as ')[1] : ''}</li>`).join('')}
                        ${movie.crew.map(c => `<li style="margin-bottom: 8px; font-style: italic;">${c}</li>`).join('')}
                    </ul>
                </div>

                <div id="watchersGuide" class="section">
                    <h2>Watcher's Guide</h2>
                    <ul style="list-style: none; padding: 0;">
                        ${movie.watchersGuide.map(w => `<li style="margin-bottom: 8px;">${w}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div style="text-align: center; padding: 50px; color: white;">
                    <h2>Oops!</h2>
                    <p>${message}</p>
                    <a href="../index.html" class="back-btn">Back to Home</a>
                </div>
            `;
        }

        window.onload = loadMovieDetails;
    </script>
</body>
</html>
