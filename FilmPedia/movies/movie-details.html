<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">FilmPedia - Movie Details</title>
    <link rel="stylesheet" href="movieStyle.css">
    <link rel="icon" type="image/png" href="photos/logo.png">
    <style>
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 24px;
            color: #61dafb;
        }
        .error-container {
            text-align: center;
            padding: 50px;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #61dafb;
            color: #282c34;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body> 
    <div class="Header">
        <h1 class="Title"><a href="../index.html" style="color: inherit; text-decoration: none;">F I L M P E D I A</a></h1>
        <h3 class="Desc">A Movie Guide</h3>
    </div>

    <div id="content">
        <div class="loading">Loading movie details...</div>
    </div>

    <div class="Footer">
        <p class="FooterText">© 2025 FilmPedia. All rights reserved.</p>
        <p class="FooterText">Mithuneesh. K</p>
        <p>@FilmPedia</p>
    </div>

    <script>
        const API_KEY = '495352769dbc05d7c88f80f7499e823e';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_PATH = 'https://image.tmdb.org/t/p/w500';

        async function loadMovieDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');
            const tmdbId = urlParams.get('tmdbId');
            const contentDiv = document.getElementById('content');

            if (!movieId && !tmdbId) {
                showError("No movie selected.");
                return;
            }

            try {
                let movie;
                if (tmdbId) {
                    // Fetch from TMDb
                    const response = await fetch(`${BASE_URL}/movie/${tmdbId}?api_key=${API_KEY}&append_to_response=credits,videos`);
                    const data = await response.json();
                    
                    movie = {
                        title: data.title,
                        image: data.poster_path ? IMG_PATH + data.poster_path : '../movies/photos/logo.png',
                        genre: data.genres.map(g => g.name).join(' • '),
                        rating: `⭐ ${data.vote_average.toFixed(1)}`,
                        description: data.overview,
                        trailerUrl: data.videos.results.find(v => v.type === 'Trailer')?.key ? `https://www.youtube.com/watch?v=${data.videos.results.find(v => v.type === 'Trailer').key}` : '',
                        cast: data.credits.cast.slice(0, 10).map(c => `${c.name} as ${c.character}`),
                        crew: data.credits.crew.filter(c => c.job === 'Director' || c.job === 'Producer').slice(0, 3).map(c => `${c.job}: ${c.name}`),
                        story: data.overview,
                        reviews: [],
                        watchersGuide: [`Runtime: ${data.runtime} min`, `Status: ${data.status}`, `Released: ${data.release_date}`],
                        funFacts: []
                    };
                } else {
                    // Fallback to local JSON
                    const response = await fetch('movies.json');
                    const movies = await response.json();
                    movie = movies.find(m => m.id === movieId);
                }

                if (!movie) {
                    showError("Movie not found.");
                    return;
                }

                document.title = movie.title;

                let html = `
                    <div id="moviePoint" class="MainMvContainer">
                        <div class="MovieContainer">
                            <img class="movieImg" src="${movie.image}" alt="${movie.title}">
                            <div class="movieDetails">
                                <span class="movieName">${movie.title}</span>
                                <p class="movieGenre">${movie.genre}</p>
                                <p class="movieRating">${movie.rating}</p>
                            </div>
                        </div>
                        <p class="movieDesc">${movie.description}</p>
                    </div>

                    <nav>
                        <ul style="border-radius: 10px;">
                            <li><a href="#moviePoint">Film</a></li>
                            <li><a href="#castCrew">Cast & Crew</a></li>
                            <li><a href="#story">Story</a></li>
                        </ul>
                    </nav>

                    <div class="section">
                        <h2>Trailer - Click ↓</h2>
                        ${movie.trailerUrl ? 
                            `<a href="${movie.trailerUrl}" target="_blank" style="color: #61dafb; font-size: 18px; text-decoration: none; font-weight: bold;">Watch the Official Trailer</a>` : 
                            `<p>Trailer not available.</p>`
                        }
                    </div>

                    <div id="castCrew" class="section">
                        <h2>Cast & Crew</h2>
                        <ul class="castList" style="flex-direction: column;">
                            ${movie.cast.map(c => `<li><strong>${c.split(' as ')[0]}</strong> ${c.includes(' as ') ? 'as ' + c.split(' as ')[1] : ''}</li>`).join('')}
                            ${movie.crew.map(c => `<li><em>${c}</em></li>`).join('')}
                        </ul>
                    </div>

                    <div id="story" class="section">
                        <h2>Story</h2>
                        <p>${movie.story}</p>
                    </div>
                `;

                if (movie.watchersGuide && movie.watchersGuide.length > 0) {
                    html += `
                        <div id="watchersGuide" class="section">
                            <h2>Watcher's Guide</h2>
                            <ul style="flex-direction: column;">
                                ${movie.watchersGuide.map(w => `<li>${w}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                contentDiv.innerHTML = html;

                document.querySelectorAll('nav ul li a').forEach(anchor => {
                    anchor.addEventListener('click', function(e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('href').substring(1);
                        document.getElementById(targetId)?.scrollIntoView({ behavior: 'smooth' });
                    });
                });

            } catch (error) {
                console.error("Error:", error);
                showError("Failed to load movie details.");
            }
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error-container">
                    <h2>Oops!</h2>
                    <p>${message}</p>
                    <a href="../index.html" class="back-btn">Back to Home</a>
                </div>
            `;
        }

        window.onload = loadMovieDetails;
    </script>
</body>
</html>
