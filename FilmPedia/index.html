<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmPedia - Movie Guide</title>
    <link rel="icon" type="image/png" href="movies/photos/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
      /* Tab and Search Specific Styles */
      .tabs { display: flex; justify-content: center; background: #0078ee; padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
      .tab-btn { background: white; border: none; padding: 10px 25px; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 50px; color: var(--primary-blue); transition: all 0.2s; }
      .tab-btn.active { background: var(--card-bg); color: #004a99; }
      .tab-content { display: none; padding: 20px 0; }
      .tab-content.active { display: block; }
      .search-container { max-width: 600px; margin: 20px auto; padding: 0 20px; }
      .searchBar { width: 100%; padding: 14px 25px; border-radius: 50px; border: 3px solid var(--card-bg); background: white; font-size: 16px; outline: none; color: var(--primary-blue); font-weight: 700; }
      .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding: 20px 30px; }
    </style>
</head>
<body>

    <div class="Header">
        <div style="width: 32px;"></div>
        <div class="HeaderContent">
            <h1 class="Title">FILMPEDIA</h1>
            <p class="Desc">A Movie Guide</p>
        </div>
        <a href="login.html" class="loginIcon"><span class="material-icons">account_circle</span></a>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('home')">HOME</button>
        <button class="tab-btn" onclick="switchTab('explore')">GLOBAL SEARCH</button>
    </div>

    <!-- HOME TAB -->
    <div id="home-tab" class="tab-content active">
        <div class="scrollHead">Trending This Week</div>
        <div class="Main" id="trending-list"></div>

        <div class="scrollHead">Hollywood Hits</div>
        <div class="Main" id="hollywood-list"></div>

        <div class="scrollHead">Animated Hits</div>
        <div class="Main" id="animated-list"></div>

        <div class="scrollHead">Indian Classics</div>
        <div class="Main" id="indian-list"></div>
    </div>

    <!-- EXPLORE TAB -->
    <div id="explore-tab" class="tab-content">
        <div class="search-container">
            <input type="text" class="searchBar" placeholder="Search for movies..." onkeyup="globalSearch(this.value)">
        </div>
        <div class="scrollHead" id="explore-title">Popular Globally</div>
        <div class="grid-layout" id="explore-results"></div>
    </div>

    <div class="Footer">
        <p>© 2025 FilmPedia. Created by Mithuneesh. K</p>
    </div>

    <script src="js/api.js"></script>
    <script>
      // Safe default for explore: PG-13 and below, no adult content
      const SAFE_EXPLORE = '/discover/movie?sort_by=popularity.desc&include_adult=false&certification_country=US&certification.lte=PG-13';

      function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId + '-tab').classList.add('active');
        event.currentTarget.classList.add('active');
        if (tabId === 'explore' && !document.getElementById('explore-results').innerHTML) {
          fetchExplore(SAFE_EXPLORE);
        }
      }

      async function fetchTrending() {
        const data = await fetchMovies('/trending/movie/week');
        const container = document.getElementById('trending-list');
        if (data) data.results.slice(0, 6).forEach(m => renderMovieCard(m, container));
      }

      async function fetchCurated(ids, containerId) {
        const container = document.getElementById(containerId);
        for (const id of ids) {
          const movie = await fetchMovieById(id);
          if (movie) renderMovieCard(movie, container);
        }
      }

      async function fetchExplore(endpoint, title = "Popular Globally") {
        const container = document.getElementById('explore-results');
        document.getElementById('explore-title').innerText = title;
        container.innerHTML = '<p style="color:white;padding:20px;">Loading...</p>';
        const data = await fetchMovies(endpoint);
        if (data && data.results) {
          // Client-side safety: skip any adult-flagged results
          const safe = data.results.filter(m => !m.adult);
          container.innerHTML = '';
          safe.forEach(m => renderMovieCard(m, container));
        }
      }

      let searchTimer;
      function globalSearch(query) {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          if (query.length > 2) {
            // Search with adult=false + PG-13 certification filter via discover
            fetchExplore(
              `/search/movie?query=${encodeURIComponent(query)}&include_adult=false`,
              `Results for: ${query}`
            );
          } else if (query.length === 0) {
            fetchExplore(SAFE_EXPLORE);
          }
        }, 300);
      }

      window.onload = () => {
        fetchTrending();
        fetchCurated(PREFERRED.hollywood, 'hollywood-list');
        fetchCurated(PREFERRED.animated, 'animated-list');
        fetchCurated(PREFERRED.indian, 'indian-list');
      };
    </script>
</body>
</html>
