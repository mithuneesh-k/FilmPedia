<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmPedia</title>
    <link rel="stylesheet" href="style.css">
	<link rel="icon" type="image/png" href="movies/photos/logo.png">
</head>
<body>
   <div class="Header">
        <div style="width: 50px;"></div> 

        <div class="HeaderContent">
            <h1 class="Title">F I L M P E D I A</h1>
            <h3 class="Desc">A Movie Guide</h3>
            
        </div>

        <div class="HeaderLogin">
            <a href="login.html">
                <img src="movies/photos/login.png" alt="Login" class="loginIcon">
            </a>
        </div>
    </div>
    <input type="text" class="searchBar" placeholder="Search for movies..." onkeyup="searchMovies()">


    <!-- TRENDING SECTION -->
    <div class="scrollHead">
        <p>TRENDING MOVIES</p>
    </div>
    <div class="Main" id="trending-list">
        <div class="loading">Discovering trends...</div>
    </div>

    <!-- HOLLYWOOD SECTION -->
    <div class="scrollHead">
        <p>HOLLYWOOD HITS</p>
    </div>
    <div class="Main" id="hollywood-list">
        <div class="loading">Loading Hollywood...</div>
    </div>

    <!-- ANIMATED HITS SECTION -->
    <div class="scrollHead">
        <p>ANIMATED HITS</p>
    </div>
    <div class="Main" id="animated-list">
        <div class="loading">Loading animation...</div>
    </div>

    <!-- INDIAN CLASSICS SECTION -->
    <div class="scrollHead">
        <p>INDIAN CLASSICS</p>
    </div>
    <div class="Main" id="indian-list">
        <div class="loading">Loading Indian cinema...</div>
    </div>

    <script>
      const API_KEY = '495352769dbc05d7c88f80f7499e823e';
      const BASE_URL = 'https://api.themoviedb.org/3';
      const IMG_PATH = 'https://image.tmdb.org/t/p/w500';

      const PREFERRED_MOVIES = {
        hollywood: [116745, 1084736, 634649, 315, 11354, 335977], // Mitty, Superman, Spiderman, Bruce, Serendipity, Minecraft
        animated: [508439, 9502, 1374523, 569094, 324849, 38757], // Demon Slayer, Panda, Narsimha, Spiderverse, Lego Batman, Tangled
        indian: [579047, 81839, 870357, 801688, 379291, 1040523] // RRR, Nanban, Jai Bhim, Kalki, Thozha, Maaveeran
      };

      async function fetchMoviesByIds(ids, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        for (const id of ids) {
            try {
                const response = await fetch(`${BASE_URL}/movie/${id}?api_key=${API_KEY}`);
                const movie = await response.json();
                renderMovieCard(movie, container);
            } catch (e) { console.error(e); }
        }
      }

      async function fetchTrending(containerId) {
        const container = document.getElementById(containerId);
        try {
          const response = await fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}`);
          const data = await response.json();
          container.innerHTML = '';
          data.results.slice(0, 6).forEach(movie => renderMovieCard(movie, container));
        } catch (e) { console.error(e); }
      }

      function renderMovieCard(movie, container) {
        container.innerHTML += `
            <div class="MainMvContainer">
                <div class="MovieContainer">
                    <img class="movieImg" src="${movie.poster_path ? IMG_PATH + movie.poster_path : 'movies/photos/logo.png'}" alt="${movie.title}">
                    <div class="movieDetails">
                        <a href="movies/movie-details.html?tmdbId=${movie.id}" class="movieName">${movie.title}</a>
                        <p class="movieGenre">${movie.release_date ? movie.release_date.split('-')[0] : 'N/A'}</p>
                        <p class="movieRating">⭐ ${movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A'}</p>
                    </div>
                </div>
                <p class="movieDesc">${movie.overview ? movie.overview.substring(0, 120) + '...' : 'No description available.'}</p>
            </div>
        `;
      }

      async function searchMovies() {
        const query = document.querySelector('.searchBar').value;
        if (query.length > 2) {
          document.querySelectorAll('.scrollHead p')[0].textContent = `SEARCH RESULTS: ${query.toUpperCase()}`;
          const container = document.getElementById('trending-list');
          const response = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`);
          const data = await response.json();
          container.innerHTML = '';
          data.results.slice(0, 10).forEach(movie => renderMovieCard(movie, container));
          document.querySelectorAll('.scrollHead, .Main').forEach((el, i) => { if(i > 1) el.style.display = 'none'; });
        } else if (query.length === 0) {
          location.reload();
        }
      }

      window.onload = () => {
        fetchTrending('trending-list');
        fetchMoviesByIds(PREFERRED_MOVIES.hollywood, 'hollywood-list');
        fetchMoviesByIds(PREFERRED_MOVIES.animated, 'animated-list');
        fetchMoviesByIds(PREFERRED_MOVIES.indian, 'indian-list');
      };
    </script>

    <style>
      .Main {
        display: flex;
        flex-wrap: nowrap;
        gap: 1rem;
        overflow-x: auto;
        padding: 15px;
        scrollbar-width: none;
      }
      
      .Main::-webkit-scrollbar { display: none; }

      .MainMvContainer {
        flex: 0 0 auto;
        background-color: rgb(178, 211, 255);
        border-radius: 10px;
        width: 340px; /* Optimized Size */
        display: flex;
        flex-direction: column;
        padding: 10px;
        transition: transform 0.3s ease;
      }

      .MainMvContainer:hover {
        transform: translateY(-5px);
      }

      .MovieContainer {
        display: grid;
        grid-template-columns: 100px 1fr;
        gap: 0.8rem;
        background: #ffffff;
        border-radius: 8px;
        padding: 0.8rem;
      }

      .movieImg {
        width: 100px;
        height: 140px;
        object-fit: cover;
        border-radius: 6px;
      }

      .movieDetails {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .movieName {
        color: dodgerblue !important;
        font-size: 1.1rem;
        font-weight: bold;
        text-decoration: none;
        line-height: 1.2;
        margin-bottom: 5px;
      }

      .movieGenre {
        font-size: 0.9rem;
        font-style: italic;
        color: #0066cc;
      }

      .movieRating {
        color: #ffae00;
        font-weight: bold;
        margin-top: 10px;
      }

      .movieDesc {
        margin: 10px;
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        font-size: 14px;
        font-weight: bold;
        color: #222;
        line-height: 1.3;
      }

      .loading { color: white; padding: 20px; }
    </style>


    <div class="Footer">
        <p class="FooterText">© 2025 FilmPedia. All rights reserved.</p>
        <p class="FooterText">Mithuneesh. K</p>
        <p>@FilmPedia</p>
    </div>
</body>
</html>
